<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Sitio Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .contact-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            font-weight: 600;
        }

        .form-group {
            position: relative;
            margin-bottom: 25px;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 16px;
            color: #333;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-size: 14px;
            pointer-events: none;
            transition: all 0.3s ease;
            background: transparent;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label,
        textarea:focus + label,
        textarea:not(:placeholder-shown) + label {
            top: -10px;
            font-size: 12px;
            color: #667eea;
            background: white;
            padding: 0 5px;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #51cf66;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        @media (max-width: 600px) {
            .contact-container {
                padding: 25px;
            }
            
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <h2>Contáctanos</h2>
        <form id="contactForm">
            <div class="form-group">
                <input type="text" id="nombre" placeholder=" " required>
                <label for="nombre">Nombre</label>
                <span class="error-message" id="error-nombre">Por favor ingresa tu nombre</span>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder=" " required>
                <label for="email">Email</label>
                <span class="error-message" id="error-email">Por favor ingresa un email válido</span>
            </div>
            <div class="form-group">
                <input type="tel" id="telefono" placeholder=" " required>
                <label for="telefono">Teléfono</label>
                <span class="error-message" id="error-telefono">Por favor ingresa tu teléfono</span>
            </div>
            <div class="form-group">
                <textarea id="mensaje" placeholder=" " required></textarea>
                <label for="mensaje">Mensaje</label>
                <span class="error-message" id="error-mensaje">Por favor ingresa tu mensaje</span>
            </div>
            <button type="submit">Enviar Mensaje</button>
            <div class="success-message" id="success-msg">¡Mensaje enviado con éxito!</div>
        </form>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let isValid = true;
            const fields = ['nombre', 'email', 'telefono', 'mensaje'];
            
            fields.forEach(field => {
                const input = document.getElementById(field);
                const errorSpan = document.getElementById('error-' + field);
                
                if (!input.value.trim()) {
                    errorSpan.style.display = 'block';
                    isValid = false;
                } else {
                    errorSpan.style.display = 'none';
                }
                
                if (field === 'email' && input.value) {
                    const emailRegex = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
                    if (!emailRegex.test(input.value)) {
                        errorSpan.style.display = 'block';
                        isValid = false;
                    }
                }
            });
            
            if (isValid) {
                document.getElementById('success-msg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('success-msg').style.display = 'none';
                    this.reset();
                }, 3000);
            }
        });
    </script>
</body>
</html>
